<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Servicios - AquaCar</title>
    <link rel="stylesheet" href="../css/servicios-admin.css" />
  </head>
  <body>
    <div class="contenedor">
      <section class="hero">
        <h1>Gestión de Servicios</h1>
        <p>Administra los servicios disponibles en AquaCar.</p>

        <div class="usuario-box">
          <span>Sesión iniciada como:</span>
          <strong id="usuario_logueado"></strong>
        </div>

        <div class="acciones-superiores">
          <a href="./admin.html" class="btn btn-volver">Volver al panel</a>
          <button id="btnCerrarSesion" class="btn btn-cerrar">
            Cerrar sesión
          </button>
        </div>
      </section>

      <section class="form-card">
        <h2 id="tituloFormulario">Crear servicio</h2>

        <div id="mensaje" class="message"></div>

        <form id="formServicio" class="form-grid">
          <input type="hidden" id="id_servicio" />

          <div class="campo">
            <label for="nombre_servicio">Nombre del servicio</label>
            <input type="text" id="nombre_servicio" required />
          </div>

          <div class="campo">
            <label for="duracion_minutos">Duración (minutos)</label>
            <input type="number" id="duracion_minutos" min="1" required />
          </div>

          <div class="campo campo-full">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" rows="4" required></textarea>
          </div>

          <div class="campo">
            <label for="precio">Precio</label>
            <input type="number" id="precio" min="0" required />
          </div>

          <div class="campo">
            <label for="activo">Estado</label>
            <select id="activo">
              <option value="1">Activo</option>
              <option value="0">Inactivo</option>
            </select>
          </div>

          <div class="acciones-form campo-full">
            <button type="submit" class="btn btn-guardar" id="btnSubmit">
              Guardar servicio
            </button>
            <button
              type="button"
              class="btn btn-limpiar"
              id="btnCancelarEdicion"
            >
              Cancelar edición
            </button>
          </div>
        </form>
      </section>

      <section class="listado-card">
        <h2>Servicios registrados</h2>
        <div id="listaServicios" class="lista-grid"></div>
      </section>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/servicios-admin.js"></script>
  </body>
</html>
