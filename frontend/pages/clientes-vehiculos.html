<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AquaCar</title>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/clientes-vehiculos.css" />
  </head>

  <body>
    <header class="navbar">
      <a href="./admin.html" class="logo-link">
        <img src="../images/logo.png" alt="Logo AquaCar" />
      </a>

      <button class="menu-toggle" type="button" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="mobile-menu">
        <div class="usuario-nav">
          👤 <strong id="usuario_logueado"></strong>
        </div>

        <nav>
          <a href="./admin.html">Panel</a>
          <a class="activo" href="./clientes-vehiculos.html">Clientes</a>
          <a href="./servicios-admin.html">Servicios</a>
          <button id="btnCerrarSesion" type="button">↪</button>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="busqueda-section">
        <label for="inputBuscar">🔍 Buscar clientes o vehículos</label>
        <input
          type="text"
          id="inputBuscar"
          placeholder="Nombre, apellido, correo, patente, marca o modelo..."
        />
      </section>

      <section class="listado-card">
        <h2>Clientes registrados</h2>

        <div id="listaClientes" class="clientes-grid">
          <p class="sin-datos">Cargando clientes...</p>
        </div>
      </section>

      <section class="listado-card">
        <h2>Vehículos registrados</h2>

        <div id="listaVehiculos" class="vehiculos-grid">
          <p class="sin-datos">Cargando vehículos...</p>
        </div>
      </section>
    </main>

    <footer>
      <p>
        © 2026 AquaCar · Lavado Automotriz Profesional. Todos los derechos
        reservados.
      </p>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/clientes-vehiculos.js"></script>
  </body>
</html>
